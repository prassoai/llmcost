# Weekly sync of the vendored LiteLLM pricing data.
#
# Fetches model_prices_and_context_window.json at upstream's current main
# commit; if it differs from the vendored copy, rewrites the embed, bumps the
# VENDORED_FROM pin, and opens a PR.
#
# The validation gate — go test, whose TestAliasesResolve asserts every model
# in the alias map still resolves to non-zero rates (LiteLLM has shipped a
# broken cost map before) — runs twice: once here, because PRs opened with
# GITHUB_TOKEN do not trigger the ci workflow automatically, and again in CI
# whenever a human pushes to or reopens the PR. A gate failure still opens the
# PR (so the breakage is visible and fixable by editing the alias map on the
# sync branch) but fails this job to raise the alarm.
name: sync-litellm

on:
  schedule:
    - cron: "43 6 * * 1" # Mondays 06:43 UTC — off the :00 stampede
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch upstream at pinned-to-be commit
        id: fetch
        run: |
          sha=$(curl -fsSL https://api.github.com/repos/BerriAI/litellm/commits/main | jq -r .sha)
          curl -fsSL -o /tmp/upstream.json \
            "https://raw.githubusercontent.com/BerriAI/litellm/${sha}/model_prices_and_context_window.json"
          jq -e 'type == "object"' /tmp/upstream.json > /dev/null # schema parse: must be a JSON object
          if cmp -s /tmp/upstream.json model_prices_and_context_window.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "sha=${sha}" >> "$GITHUB_OUTPUT"
            cp /tmp/upstream.json model_prices_and_context_window.json
            sed -i "s/^commit: .*/commit: ${sha}/" VENDORED_FROM
          fi
      - uses: actions/setup-go@v5
        if: steps.fetch.outputs.changed == 'true'
        with:
          go-version-file: go.mod
      - name: validation gate
        id: gate
        if: steps.fetch.outputs.changed == 'true'
        continue-on-error: true
        run: go test ./...
      - name: open PR
        if: steps.fetch.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: sync/litellm-prices
          commit-message: "Sync LiteLLM pricing data to BerriAI/litellm@${{ steps.fetch.outputs.sha }}"
          title: "Sync LiteLLM pricing data"
          body: |
            Automated weekly sync of `model_prices_and_context_window.json`
            from BerriAI/litellm@${{ steps.fetch.outputs.sha }}.

            Validation gate (`go test ./...`, includes `TestAliasesResolve`):
            **${{ steps.gate.outcome }}**. If it failed, a model in the alias
            map no longer resolves to non-zero rates upstream — fix the alias
            map on this branch before merging.

            Merging auto-tags the next patch release.
      - name: fail job if gate failed
        if: steps.fetch.outputs.changed == 'true' && steps.gate.outcome == 'failure'
        run: |
          echo "::error::validation gate failed: an aliased model no longer resolves to non-zero rates"
          exit 1
